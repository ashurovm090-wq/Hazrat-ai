<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Furniture Factory Gold Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; overflow: hidden; }
        canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
    </style>
</head>
<body>
<script>
/**
 * MOON FACTORY: PRESTIGE VERSION
 * Все объекты отрисованы вручную через геометрические примитивы для имитации Pixel Art.
 */

const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 600 },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, cursors, currentRoom = 1, status = "IDLE";
let factoryLayer, objectsGroup, uiContainer, hintText, zoneDoor;

function preload() {}

function create() {
    // Создаем слои
    factoryLayer = this.add.container(0, 0);
    objectsGroup = this.physics.add.staticGroup();
    
    // Интерфейс
    createUI(this);

    // СОЗДАНИЕ ГЕРОЯ (МУН)
    player = createMoon(this, 400, 300);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true).setSize(40, 50);

    setupRoom(this, 1);

    // Управление
    this.input.on('pointerdown', (pointer) => {
        this.physics.moveToObject(player, pointer, 260);
    });
}

function createMoon(scene, x, y) {
    const container = scene.add.container(x, y);
    
    const shadow = scene.add.ellipse(0, 25, 40, 15, 0x000000, 0.2);
    const legs = scene.add.rectangle(0, 20, 30, 20, 0x1a1a1a); // Штаны
    const torso = scene.add.rectangle(0, -5, 34, 40, 0xffffff); // Тельняшка
    
    // Красные полоски
    for(let i=0; i<6; i++) {
        torso.setStrokeStyle(0);
        container.add(scene.add.rectangle(0, -20 + (i*7), 34, 3, 0xd32f2f));
    }

    const head = scene.add.rectangle(0, -35, 26, 28, 0xffdbac);
    
    // Ирокез (Синий)
    const hair = scene.add.container(0, -45);
    for(let i=0; i<5; i++) {
        hair.add(scene.add.rectangle(-10 + (i*5), -5, 8, 18, 0x0277bd).setAngle(-10 + i*5));
    }

    container.add([shadow, legs, torso, head, hair]);
    return container;
}

function setupRoom(scene, roomID) {
    currentRoom = roomID;
    factoryLayer.removeAll(true);
    objectsGroup.clear(true, true);
    if(zoneDoor) zoneDoor.destroy();

    // Пол с градиентом и грязью
    const bg = scene.add.rectangle(400, 300, 800, 600, roomID === 1 ? 0x4e342e : (roomID === 2 ? 0x37474f : 0x1b5e20));
    const grid = scene.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0.1);
    factoryLayer.add([bg, grid]);

    if (roomID === 1) {
        hintText.setText("ЦЕХ №1: СКЛАД СЫРЬЯ");
        // Паллеты с деревом
        for(let i=0; i<3; i++) {
            createPallet(scene, 150, 150 + (i*150), i === 1);
        }
    } else if (roomID === 2) {
        hintText.setText("ЦЕХ №2: ОБРАБОТКА И КРОМКА");
        createSawMachine(scene, 300, 200);
        createEdgeMachine(scene, 500, 450);
    } else if (roomID === 3) {
        hintText.setText("ЦЕХ №3: УПАКОВКА");
        createPackingStation(scene, 400, 300);
    }
}

// --- ДЕТАЛИЗИРОВАННЫЕ ОБЪЕКТЫ ---

function createPallet(scene, x, y, interactive) {
    const base = scene.add.rectangle(x, y, 120, 15, 0x795548);
    const wood = scene.add.rectangle(x, y-25, 110, 40, 0xbcaa8a).setStrokeStyle(2, 0x8d6e63);
    factoryLayer.add([base, wood]);
    
    if(interactive) {
        const zone = scene.add.rectangle(x, y, 120, 80, 0x00ff00, 0).setOrigin(0.5);
        scene.physics.add.existing(zone, true);
        scene.physics.add.overlap(player, zone, () => {
            if(status === "IDLE") {
                status = "WOOD";
                updateMoonCargo(scene, 0xbcaa8a);
                showNotification(scene, "МАТЕРИАЛ ВЗЯТ!");
                spawnDoor(scene, 760, 300, 2);
            }
        });
    }
}

function createSawMachine(scene, x, y) {
    const body = scene.add.rectangle(x, y, 180, 120, 0x616161).setStrokeStyle(4, 0x212121);
    const table = scene.add.rectangle(x, y-10, 160, 70, 0x9e9e9e);
    const sawDisk = scene.add.circle(x, y-15, 20, 0x212121).setAlpha(0.7);
    const lever = scene.add.rectangle(x-70, y, 10, 40, 0xff0000);
    factoryLayer.add([body, table, sawDisk, lever]);

    const zone = scene.add.rectangle(x, y, 180, 120, 0, 0);
    scene.physics.add.existing(zone, true);
    scene.physics.add.overlap(player, zone, () => {
        if(status === "WOOD") {
            status = "SAWED";
            updateMoonCargo(scene, 0x8d6e63);
            showNotification(scene, "РАСПИЛЕНО!");
        }
    });
}

function createEdgeMachine(scene, x, y) {
    const body = scene.add.rectangle(x, y, 200, 100, 0x37474f).setStrokeStyle(4, 0x102027);
    for(let i=0; i<4; i++) factoryLayer.add(scene.add.circle(x-60+(i*40), y, 15, 0x1a1a1a));
    const monitor = scene.add.rectangle(x+60, y-60, 40, 30, 0x000000).setStrokeStyle(2, 0x00ff00);
    factoryLayer.add([body, monitor]);

    const zone = scene.add.rectangle(x, y, 200, 100, 0, 0);
    scene.physics.add.existing(zone, true);
    scene.physics.add.overlap(player, zone, () => {
        if(status === "SAWED") {
            status = "EDGED";
            updateMoonCargo(scene, 0x5d4037);
            showNotification(scene, "КРОМКА ГОТОВА!");
            spawnDoor(scene, 760, 300, 3);
        }
    });
}

function createPackingStation(scene, x, y) {
    const table = scene.add.rectangle(x, y, 220, 140, 0x424242).setStrokeStyle(4, 0x000);
    const roll = scene.add.rectangle(x, y, 100, 100, 0xe3f2fd, 0.5);
    factoryLayer.add([table, roll]);

    const zone = scene.add.rectangle(x, y, 220, 140, 0, 0);
    scene.physics.add.existing(zone, true);
    scene.physics.add.overlap(player, zone, () => {
        if(status === "EDGED") {
            status = "PACKED";
            updateMoonCargo(scene, 0xffffff);
            showNotification(scene, "УПАКОВАНО!");
            spawnDoor(scene, 400, 560, "FINISH");
        }
    });
}

function updateMoonCargo(scene, color) {
    player.getByName('cargo')?.destroy();
    const cargo = scene.add.rectangle(0, 0, 45, 30, color).setName('cargo').setAlpha(0.8).setStrokeStyle(1, 0x000);
    player.add(cargo);
}

function spawnDoor(scene, x, y, target) {
    if(zoneDoor) zoneDoor.destroy();
    zoneDoor = scene.add.container(x, y);
    const rect = scene.add.rectangle(0, 0, 80, 80, 0x00ff00, 0.2).setStrokeStyle(2, 0x00ff00);
    const txt = scene.add.text(0, 0, "ДАЛЕЕ", {fontSize: '12px'}).setOrigin(0.5);
    zoneDoor.add([rect, txt]);
    
    scene.physics.add.existing(zoneDoor);
    scene.physics.add.overlap(player, zoneDoor, () => {
        if(target === "FINISH") {
            finishGame(scene);
        } else {
            player.setPosition(100, 300);
            setupRoom(scene, target);
        }
    });
}

function createUI(scene) {
    uiContainer = scene.add.container(0, 0).setScrollFactor(0);
    const panel = scene.add.rectangle(400, 30, 780, 50, 0x000000, 0.8).setStrokeStyle(2, 0xffd54f);
    hintText = scene.add.text(40, 20, "ЗАВОД МЕБЕЛИ: МУН В ДЕЛЕ", { fontSize: '20px', fill: '#ffd54f', fontStyle: 'bold' });
    uiContainer.add([panel, hintText]);
}

function showNotification(scene, txt) {
    const note = scene.add.text(400, 500, txt, { fontSize: '30px', fill: '#0f0', backgroundColor: '#000', padding: 10 }).setOrigin(0.5);
    scene.tweens.add({ targets: note, alpha: 0, y: 450, duration: 2000, onComplete: () => note.destroy() });
}

function finishGame(scene) {
    scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.8);
    scene.add.text(400, 300, "ПЛАН ВЫПОЛНЕН!\nМУН ПОЛУЧИЛ ЗАРПЛАТУ\n100 000 РУБ.", { 
        fontSize: '42px', fill: '#0f0', align: 'center', fontStyle: 'bold' 
    }).setOrigin(0.5);
    scene.physics.pause();
}

function update() {
    if (!this.input.activePointer.isDown) {
        player.body.setVelocity(0);
    }
}
</script>
</body>
</html>
