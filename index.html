<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MicroMoon: Factory Rooms</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 600 },
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, messageText, currentRoom = 1;
        let status = "START"; 
        let zones = {};

        function create() {
            createRoom(this, 1); // Начинаем в первой комнате

            // МУН (Рыжий, тельняшка)
            player = this.add.container(400, 300);
            player.add([
                this.add.rectangle(0, 15, 30, 25, 0x212121), // штаны
                this.add.rectangle(0, -10, 32, 32, 0xffffff), // тельняшка
                this.add.rectangle(0, -18, 32, 4, 0x1a237e), // полоски
                this.add.rectangle(0, -10, 32, 4, 0x1a237e),
                this.add.rectangle(0, -2, 32, 4, 0x1a237e),
                this.add.rectangle(0, -35, 24, 25, 0xffccbc), // лицо
                this.add.rectangle(0, -50, 32, 20, 0xe64a19)  // рыжие волосы
            ]);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            messageText = this.add.text(400, 30, 'ЦЕХ 1: СКЛАД. ВОЗЬМИ ЛИСТ ДСП!', { 
                fontSize: '20px', fill: '#fff', backgroundColor: '#000', padding: 5 
            }).setOrigin(0.5);
        }

        function createRoom(scene, roomNumber) {
            // Очистка старых зон
            if (zones.group) zones.group.clear(true, true);
            zones.group = scene.physics.add.staticGroup();

            if (roomNumber === 1) {
                scene.add.rectangle(400, 300, 800, 600, 0x5d4037); // Цвет пола
                let dsp = scene.add.rectangle(100, 300, 120, 160, 0xffa726).setStrokeStyle(2, 0xffffff);
                scene.add.text(100, 300, "ЛИСТЫ ДСП", {color: '#000'}).setOrigin(0.5);
                let trigger = scene.physics.add.staticSprite(100, 300).setSize(120, 160);
                
                scene.physics.add.overlap(player, trigger, () => {
                    if (status === "START") {
                        status = "HAS_DSP";
                        updateItemVisual(0xffa726);
                        messageText.setText("ЛИСТ ВЗЯТ! ИДИ В ЦЕХ РАСПИЛА (НАПРАВО)");
                    }
                });

                // Переход в комнату 2
                let door = scene.add.rectangle(780, 300, 40, 150, 0x000, 0.5);
                scene.add.text(760, 220, "В ЦЕХ 2", {fontSize: '12px'});
                let doorTrigger = scene.physics.add.staticSprite(780, 300).setSize(40, 150);
                scene.physics.add.overlap(player, doorTrigger, () => {
                    if (status !== "START") changeRoom(scene, 2, 60, 300);
                });
            } 
            
            else if (roomNumber === 2) {
                scene.add.rectangle(400, 300, 800, 600, 0x455a64); // Другой пол
                messageText.setText("ЦЕХ 2: РАСПИЛ И КРОМКА");
                
                let cpu = scene.add.rectangle(400, 150, 150, 100, 0x212121).setStrokeStyle(2, 0x0f0);
                scene.add.text(400, 150, "ЧПУ РОБОТ", {color: '#fff'}).setOrigin(0.5);
                let cpuTrigger = scene.physics.add.staticSprite(400, 150).setSize(150, 100);

                let kroma = scene.add.rectangle(400, 450, 150, 100, 0x37474f).setStrokeStyle(2, 0x0ff);
                scene.add.text(400, 450, "КРОМКА", {color: '#fff'}).setOrigin(0.5);
                let kromaTrigger = scene.physics.add.staticSprite(400, 450).setSize(150, 100);

                scene.physics.add.overlap(player, cpuTrigger, () => {
                    if (status === "HAS_DSP") {
                        status = "CPU_DONE";
                        updateItemVisual(0x8d6e63);
                        messageText.setText("РАСПИЛЕНО! ТЕПЕРЬ НА КРОМКУ (ВНИЗУ)");
                    }
                });

                scene.physics.add.overlap(player, kromaTrigger, () => {
                    if (status === "CPU_DONE") {
                        status = "KROMKA_DONE";
                        messageText.setText("КРОМКА ГОТОВА! ИДИ В ЦЕХ УПАКОВКИ (НАПРАВО)");
                    }
                });

                let door = scene.add.rectangle(780, 300, 40, 150, 0x000, 0.5);
                let doorTrigger = scene.physics.add.staticSprite(780, 300).setSize(40, 150);
                scene.physics.add.overlap(player, doorTrigger, () => {
                    if (status === "KROMKA_DONE") changeRoom(scene, 3, 60, 300);
                });
            }

            else if (roomNumber === 3) {
                scene.add.rectangle(400, 300, 800, 600, 0x2e7d32);
                messageText.setText("ЦЕХ 3: УПАКОВКА");

                let pack = scene.add.rectangle(400, 300, 120, 120, 0xffffff, 0.8).setStrokeStyle(4, 0x000);
                scene.add.text(400, 300, "СТРЕЙЧ", {color: '#000'}).setOrigin(0.5);
                let packTrigger = scene.physics.add.staticSprite(400, 300).setSize(120, 120);

                scene.physics.add.overlap(player, packTrigger, () => {
                    if (status === "KROMKA_DONE") {
                        status = "PACKED";
                        updateItemVisual(0xeeeeee);
                        messageText.setText("ЗАПАКОВАНО! НЕСИ К ВЫХОДУ (ВНИЗУ)");
                    }
                });

                let exit = scene.add.rectangle(400, 580, 200, 40, 0x000);
                let exitTrigger = scene.physics.add.staticSprite(400, 580).setSize(200, 40);
                scene.physics.add.overlap(player, exitTrigger, () => {
                    if (status === "PACKED") {
                        status = "FINISH";
                        messageText.setText("МУН, ТЫ ЛУЧШИЙ! ПЛАН ВЫПОЛНЕН!");
                        scene.add.text(400, 200, "ЗАРПЛАТА ПРИШЛА!", {fontSize: '40px', fill: '#ff0'}).setOrigin(0.5);
                    }
                });
            }
        }

        function changeRoom(scene, nextRoom, startX, startY) {
            scene.cameras.main.fadeOut(300, 0, 0, 0);
            scene.cameras.main.once('camerafadeoutcomplete', () => {
                scene.add.rectangle(400, 300, 800, 600, 0x000); // Очистка визуала
                player.setPosition(startX, startY);
                createRoom(scene, nextRoom);
                scene.cameras.main.fadeIn(300, 0, 0, 0);
            });
        }

        function updateItemVisual(color) {
            player.getByName('item')?.destroy();
            let item = game.scene.scenes[0].add.rectangle(0, -15, 60, 40, color, 0.9).setName('item');
            player.add(item);
        }

        function update() {
            if (this.input.activePointer.isDown && status !== "FINISH") {
                this.physics.moveToObject(player, this.input.activePointer, 320);
            } else {
                player.body.setVelocity(0);
            }
        }
    </script>
</body>
</html>
