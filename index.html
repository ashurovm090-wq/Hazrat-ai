<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MicroMoon: Pro Factory</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 600 },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, floor, currentRoom = 1, status = "START";
        let objectsGroup, door, uiText;

        function create() {
            // ФОН ЦЕХА
            floor = this.add.rectangle(400, 300, 800, 600, 0x3e2723);
            this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0.2);

            // СОЗДАЕМ МУНА (Максимально как на фото)
            player = this.add.container(400, 300);
            let shadow = this.add.ellipse(0, 28, 35, 12, 0x000000, 0.3);
            let body = this.add.rectangle(0, 0, 30, 45, 0xffffff); // Тельняшка
            for(let i=0; i<5; i++) player.add(this.add.rectangle(0, -15+(i*7), 30, 3, 0xed1c24)); // Красные полоски!
            let head = this.add.rectangle(0, -35, 24, 26, 0xffdbac);
            let hair = this.add.container(0, -45); // Ирокез
            for(let i=0; i<3; i++) hair.add(this.add.rectangle(-8+(i*8), -10, 10, 15, 0x0071bc)); 
            let pants = this.add.rectangle(0, 25, 32, 20, 0x1a1a1a); // Спортивки
            player.add([shadow, body, head, hair, pants]);
            
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true).setSize(40, 60);

            objectsGroup = this.physics.add.staticGroup();
            uiText = this.add.text(20, 20, '', { fontSize: '18px', fill: '#ffd54f', backgroundColor: '#212121', padding: 5 });

            drawRoom(this, 1);
        }

        // Рисуем реалистичный станок ЧПУ
        function createSawMachine(scene, x, y) {
            let base = scene.add.rectangle(x, y, 160, 100, 0x757575).setStrokeStyle(4, 0x424242);
            let table = scene.add.rectangle(x, y-10, 140, 60, 0xbdbdbd);
            let blade = scene.add.circle(x, y-10, 15, 0x424242).setAlpha(0.8); // Пила
            let detail = scene.add.rectangle(x-40, y-15, 40, 5, 0xffffff); // Кнопки
            let obj = scene.add.container(0, 0, [base, table, blade, detail]);
            let trigger = scene.add.rectangle(x, y, 160, 100, 0x000, 0);
            scene.physics.add.existing(trigger, true);
            return trigger;
        }

        // Рисуем реалистичный кромочник
        function createEdgeMachine(scene, x, y) {
            let base = scene.add.rectangle(x, y, 180, 80, 0x455a64).setStrokeStyle(4, 0x263238);
            let rollers = scene.add.container(x, y);
            for(let i=0; i<3; i++) rollers.add(scene.add.circle(-50+(i*50), 0, 12, 0x212121));
            let light = scene.add.circle(x+70, y-20, 5, 0x00e676); // Индикатор
            let trigger = scene.add.rectangle(x, y, 180, 80, 0x000, 0);
            scene.physics.add.existing(trigger, true);
            return trigger;
        }

        function drawRoom(scene, room) {
            currentRoom = room;
            objectsGroup.clear(true, true);
            if(door) door.destroy();

            if (room === 1) {
                floor.setFillStyle(0x4e342e);
                uiText.setText("ЗАДАНИЕ: ВОЗЬМИ ЛИСТ ДСП НА ПАЛЛЕТЕ");
                // Паллета с ДСП
                let pallet = scene.add.rectangle(150, 350, 120, 20, 0x795548);
                let stack = scene.add.rectangle(150, 330, 110, 40, 0xffcc80).setStrokeStyle(1, 0xef6c00);
                let obj = scene.physics.add.existing(scene.add.rectangle(150, 340, 120, 60, 0x000, 0), true);
                
                scene.physics.add.overlap(player, obj, () => {
                    if (status === "START") {
                        status = "HAS_DSP";
                        updateCargo(0xffcc80, 60, 40);
                        uiText.setText("ЛИСТ ВЗЯТ. НЕСИ В ЦЕХ РАСПИЛА (НАПРАВО)");
                        createDoor(scene, 770, 300);
                    }
                });
            } 
            else if (room === 2) {
                floor.setFillStyle(0x37474f);
                uiText.setText("ЗАДАНИЕ: РАСПИЛИ НА ЧПУ И ПОКЛЕЙ КРОМКУ");
                
                let saw = createSawMachine(scene, 400, 150);
                let edge = createEdgeMachine(scene, 400, 450);

                scene.physics.add.overlap(player, saw, () => {
                    if (status === "HAS_DSP") {
                        status = "CPU_DONE";
                        updateCargo(0xa1887f, 40, 30);
                        uiText.setText("ГОТОВО. ТЕПЕРЬ НА КРОМОЧНЫЙ СТАНОК");
                    }
                });

                scene.physics.add.overlap(player, edge, () => {
                    if (status === "CPU_DONE") {
                        status = "KROMKA_DONE";
                        updateCargo(0x8d6e63, 40, 32); // Видна кромка
                        uiText.setText("КРОМКА ОК. ТАЩИ НА УПАКОВКУ (НАПРАВО)");
                        createDoor(scene, 770, 300);
                    }
                });
            }
            else if (room === 3) {
                floor.setFillStyle(0x2e7d32);
                uiText.setText("ЗАДАНИЕ: ЗАМОТАЙ В СТРЕЙЧ И ОТГРУЖАЙ");
                let table = scene.add.rectangle(400, 300, 150, 100, 0x9e9e9e).setStrokeStyle(2, 0x424242);
                let stretch = scene.add.rectangle(400, 300, 80, 80, 0xe3f2fd, 0.6);
                let trigger = scene.physics.add.existing(scene.add.rectangle(400, 300, 150, 100, 0x000, 0), true);

                scene.physics.add.overlap(player, trigger, () => {
                    if (status === "KROMKA_DONE") {
                        status = "PACKED";
                        updateCargo(0xffffff, 45, 35);
                        uiText.setText("ГОТОВО! ВЫХОДИ ЧЕРЕЗ ВОРОТА");
                        createDoor(scene, 400, 570);
                    }
                });
            }
        }

        function createDoor(scene, x, y) {
            door = scene.add.rectangle(x, y, 60, 60, 0xffff00, 0.3);
            scene.add.text(x, y, "ВЫХОД", {fontSize: '12px'}).setOrigin(0.5);
            scene.physics.add.existing(door, true);
            scene.physics.add.overlap(player, door, () => {
                if (currentRoom < 3) {
                    player.setPosition(80, 300);
                    drawRoom(scene, currentRoom + 1);
                } else if (status === "PACKED") {
                    uiText.setText("МИССИЯ ВЫПОЛНЕНА! ПРЕМЬЯ В КАРМАНЕ!");
                    scene.physics.pause();
                }
            });
        }

        function updateCargo(col, w, h) {
            player.getByName('item')?.destroy();
            let c = game.scene.scenes[0].add.rectangle(0, 0, w, h, col).setName('item').setAlpha(0.9).setStrokeStyle(1, 0x000);
            player.add(c);
        }

        function update() {
            if (this.input.activePointer.isDown) {
                this.physics.moveToObject(player, this.input.activePointer, 280);
            } else {
                player.body.setVelocity(0);
            }
        }
    </script>
</body>
</html>
