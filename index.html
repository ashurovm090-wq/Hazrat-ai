<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MicroMoon: Furniture Tycoon</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 600 },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, messageText, floor, currentRoom = 1, status = "START";
        let objectsGroup, door;

        function create() {
            floor = this.add.rectangle(400, 300, 800, 600, 0x5d4037);
            this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0.1);

            // СОЗДАЕМ МУНА
            player = this.add.container(400, 300);
            let body = this.add.rectangle(0, 0, 34, 52, 0xffffff); // Тельняшка
            for(let i=0; i<4; i++) player.add(this.add.rectangle(0, -12+(i*8), 34, 4, 0x1a237e));
            let head = this.add.rectangle(0, -38, 26, 26, 0xffccbc);
            let hair = this.add.rectangle(0, -52, 34, 20, 0xe64a19); // Рыжий
            let pants = this.add.rectangle(0, 26, 34, 18, 0x212121); // Джоггеры
            player.add([body, head, hair, pants]);
            
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            objectsGroup = this.physics.add.staticGroup();
            messageText = this.add.text(400, 40, '', { fontSize: '20px', fill: '#fff', backgroundColor: '#000', padding: 10 }).setOrigin(0.5);

            drawRoom(this, 1);

            // ЛОГИКА ТАПА
            this.input.on('pointerdown', (pointer) => {
                this.physics.moveToObject(player, pointer, 300);
            });
        }

        function drawRoom(scene, room) {
            currentRoom = room;
            objectsGroup.clear(true, true);
            if(door) door.destroy();

            if (room === 1) {
                floor.setFillStyle(0x5d4037);
                messageText.setText("ЦЕХ 1: СКЛАД. ВОЗЬМИ ЛИСТ ДСП!");
                let dsp = scene.add.rectangle(150, 300, 100, 150, 0xffa726).setStrokeStyle(3, 0xffffff);
                scene.add.text(150, 300, "ДСП", {color: '#000', fontStyle: 'bold'}).setOrigin(0.5);
                objectsGroup.add(dsp);

                scene.physics.add.overlap(player, dsp, () => {
                    if (status === "START") {
                        status = "HAS_DSP";
                        addCargo(0xffa726);
                        messageText.setText("ЛИСТ У МУНА! ДУЙ В ЦЕХ 2 (СПРАВА)");
                        createDoor(scene, 760, 300, "В ЦЕХ 2");
                    }
                });
            } 
            else if (room === 2) {
                floor.setFillStyle(0x455a64);
                messageText.setText("ЦЕХ 2: РАБОТА С РОБОТОМ И КРОМКОЙ");
                
                let cpu = scene.add.rectangle(400, 180, 160, 100, 0x212121).setStrokeStyle(2, 0x0f0);
                scene.add.text(400, 180, "ЧПУ РОБОТ", {fontSize: '16px'});
                
                let kroma = scene.add.rectangle(400, 420, 160, 100, 0x37474f).setStrokeStyle(2, 0x0ff);
                scene.add.text(400, 420, "КРОМКА", {fontSize: '16px'});

                objectsGroup.add(cpu);
                objectsGroup.add(kroma);

                scene.physics.add.overlap(player, cpu, () => {
                    if (status === "HAS_DSP") {
                        status = "CPU_DONE";
                        addCargo(0x8d6e63);
                        messageText.setText("РАСПИЛЕНО! ТЕПЕРЬ ПОКЛЕЙ КРОМКУ");
                    }
                });

                scene.physics.add.overlap(player, kroma, () => {
                    if (status === "CPU_DONE") {
                        status = "KROMKA_DONE";
                        messageText.setText("ГОТОВО! ИДИ НА УПАКОВКУ (СПРАВА)");
                        createDoor(scene, 760, 300, "В ЦЕХ 3");
                    }
                });
            }
            else if (room === 3) {
                floor.setFillStyle(0x1b5e20);
                messageText.setText("ЦЕХ 3: УПАКОВКА В СТРЕЙЧ");
                let pack = scene.add.rectangle(400, 300, 150, 150, 0xffffff, 0.8).setStrokeStyle(4, 0x000);
                scene.add.text(400, 300, "СТРЕЙЧ-ПЛЕНКА", {color: '#000', fontStyle: 'bold'}).setOrigin(0.5);
                objectsGroup.add(pack);

                scene.physics.add.overlap(player, pack, () => {
                    if (status === "KROMKA_DONE") {
                        status = "PACKED";
                        addCargo(0xeeeeee);
                        messageText.setText("ЗАПАКОВАНО! ВСЁ, ТАЩИ К ВЫХОДУ!");
                        createDoor(scene, 400, 560, "ВЫХОД (ЖМИ СЮДА)");
                    }
                });
            }
        }

        function createDoor(scene, x, y, txt) {
            door = scene.add.rectangle(x, y, 80, 80, 0x00ff00, 0.3).setStrokeStyle(2, 0x00ff00);
            scene.add.text(x, y, txt, {fontSize: '14px', fill: '#0f0', fontStyle: 'bold'}).setOrigin(0.5);
            scene.physics.add.existing(door, true);
            scene.physics.add.overlap(player, door, () => {
                if (currentRoom < 3) {
                    player.setPosition(80, 300);
                    drawRoom(scene, currentRoom + 1);
                } else if (status === "PACKED") {
                    finishGame(scene);
                }
            });
        }

        function addCargo(col) {
            player.getByName('item')?.destroy();
            let c = game.scene.scenes[0].add.rectangle(0, 0, 45, 30, col, 0.9).setName('item');
            player.add(c);
        }

        function finishGame(scene) {
            status = "FINISH";
            messageText.setText("СМЕНА ОКОНЧЕНА! КРАСАВА, МУН!");
            scene.add.text(400, 300, "ЗАРПЛАТА: 100.000₽\nМОЖНО ОТДЫХАТЬ!", { 
                fontSize: '40px', fill: '#0f0', align: 'center', backgroundColor: '#000' 
            }).setOrigin(0.5);
            scene.physics.pause();
        }

        function update() {
            if (!this.input.activePointer.isDown) player.body.setVelocity(0);
        }
    </script>
</body>
</html>
